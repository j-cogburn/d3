name: Version sync check

on:
  push:
    tags:
      - 'v*'

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify package.json version matches git tag
        run: |
          TAG="${GITHUB_REF_NAME}"           # e.g. v1.22.0
          PKG_VERSION=$(node -p "require('./package.json').version")  # e.g. 1.22.0
          TAG_VERSION="${TAG#v}"             # strip leading v

          echo "Git tag:          $TAG"
          echo "package.json:     $PKG_VERSION"
          echo "Expected version: $TAG_VERSION"

          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo ""
            echo "❌ VERSION MISMATCH"
            echo "   package.json is $PKG_VERSION but git tag is $TAG"
            echo ""
            echo "Fix: update package.json version to $TAG_VERSION and push a new commit."
            echo "Then re-tag: git tag -d $TAG && git tag $TAG && git push origin $TAG --force"
            exit 1
          fi

          echo "✓ Version $PKG_VERSION matches tag $TAG"
