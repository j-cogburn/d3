<svg viewBox="0 0 880 470" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect x="0" y="0" width="880" height="470" rx="14" fill="#ffffff"/>
  <text x="32" y="38" font-size="20" font-weight="700" fill="#0f172a">D3 v2 — node graph &amp; persistence</text>
  <text x="32" y="60" font-size="13" fill="#64748b">Tree (parent_id) + typed-edge overlay (refs). Files are truth; SQLite is a derived, rebuildable index.</text>

  <defs>
    <marker id="a1" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>

  <!-- LEFT: the tree/ontology -->
  <text x="40" y="92" font-size="13" font-weight="700" fill="#334155">The node graph</text>

  <rect x="40" y="104" width="150" height="40" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="115" y="129" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">VISION</text>

  <rect x="40" y="170" width="220" height="56" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="52" y="192" font-size="13" font-weight="700" fill="#1e3a8a">OBJECTIVE</text>
  <text x="52" y="210" font-size="10" fill="#475569">id · parent_id · success_metric · door</text>
  <text x="52" y="222" font-size="10" fill="#475569">level: outcome | atomic</text>

  <!-- self loop note -->
  <path d="M260 184 q40 0 40 20 q0 20 -40 20" fill="none" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#a1)"/>
  <text x="270" y="244" font-size="9.5" fill="#64748b">nests on itself</text>

  <!-- children -->
  <rect x="40" y="262" width="100" height="46" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="90" y="282" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">OPTION</text>
  <text x="90" y="298" text-anchor="middle" font-size="9" fill="#475569">scored · reco</text>

  <rect x="150" y="262" width="100" height="46" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="200" y="282" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">SKETCH</text>
  <text x="200" y="298" text-anchor="middle" font-size="9" fill="#475569">domain · vN</text>

  <rect x="260" y="262" width="130" height="46" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="325" y="282" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">DIRECTIVE</text>
  <text x="325" y="298" text-anchor="middle" font-size="9" fill="#475569">parent_id = objective (law)</text>

  <rect x="150" y="330" width="160" height="42" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="230" y="350" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">EVIDENCE</text>
  <text x="230" y="365" text-anchor="middle" font-size="9" fill="#475569">target_id -&gt; any node</text>

  <!-- tree edges -->
  <g stroke="#94a3b8" stroke-width="1.5" fill="none">
    <line x1="115" y1="144" x2="115" y2="170" marker-end="url(#a1)"/>
    <line x1="90" y1="226" x2="90" y2="262" marker-end="url(#a1)"/>
    <line x1="150" y1="226" x2="200" y2="262" marker-end="url(#a1)"/>
    <line x1="220" y1="226" x2="325" y2="262" marker-end="url(#a1)"/>
    <line x1="325" y1="308" x2="250" y2="330" marker-end="url(#a1)"/>
  </g>
  <text x="40" y="392" font-size="10" fill="#64748b">edges: child_of · blocks/blocked_by (DAG) · supersedes · derived_from · gated_by</text>

  <!-- divider -->
  <line x1="430" y1="80" x2="430" y2="410" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- RIGHT: persistence pipeline -->
  <text x="455" y="92" font-size="13" font-weight="700" fill="#334155">Persistence — files are truth, index is derived</text>

  <rect x="455" y="110" width="180" height="86" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="465" y="131" font-size="12" font-weight="700" fill="#92400e">SOURCE OF TRUTH</text>
  <text x="465" y="149" font-size="10" fill="#475569">.d3/objectives/ *.md</text>
  <text x="465" y="163" font-size="10" fill="#475569">.d3/directives/ *.md</text>
  <text x="465" y="177" font-size="10" fill="#475569">options/ sketches/ evidence/</text>
  <text x="465" y="191" font-size="9" fill="#92400e">one file per node · YAML frontmatter · git-diffable</text>

  <!-- d3 index -->
  <rect x="685" y="124" width="150" height="58" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="760" y="147" text-anchor="middle" font-size="13" font-weight="700" fill="#3730a3">d3 index</text>
  <text x="760" y="165" text-anchor="middle" font-size="9.5" fill="#475569">parse · check · build</text>

  <line x1="635" y1="153" x2="683" y2="153" stroke="#94a3b8" stroke-width="2" marker-end="url(#a1)"/>

  <!-- integrity gate -->
  <rect x="685" y="206" width="150" height="74" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="760" y="226" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">INTEGRITY GATE</text>
  <text x="694" y="243" font-size="9" fill="#475569">the law (parent objective)</text>
  <text x="694" y="256" font-size="9" fill="#475569">no cycles · no dangling refs</text>
  <text x="694" y="269" font-size="9" fill="#475569">rollups · 1 approved sketch</text>
  <line x1="760" y1="182" x2="760" y2="206" stroke="#94a3b8" stroke-width="2" marker-end="url(#a1)"/>

  <!-- outputs -->
  <rect x="455" y="232" width="180" height="48" rx="8" fill="#f0fdf4" stroke="#059669" stroke-width="1.5"/>
  <text x="545" y="252" text-anchor="middle" font-size="11" font-weight="700" fill="#065f46">.d3/index.json</text>
  <text x="545" y="268" text-anchor="middle" font-size="9" fill="#475569">always written (guaranteed)</text>

  <rect x="455" y="294" width="180" height="48" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="545" y="314" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">.d3/index.db (SQLite)</text>
  <text x="545" y="330" text-anchor="middle" font-size="9" fill="#475569">best-effort · gitignored · rebuildable</text>

  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <path d="M685 235 H648 V256 H637" marker-end="url(#a1)"/>
    <path d="M685 250 H660 V318 H637" marker-end="url(#a1)"/>
  </g>

  <text x="455" y="372" font-size="10" fill="#64748b">Truth never lives in the db: delete it and `d3 index` restores it. Gate runs on</text>
  <text x="455" y="386" font-size="10" fill="#64748b">SessionStart + pre-commit; an error blocks like any quality gate.</text>
</svg>
