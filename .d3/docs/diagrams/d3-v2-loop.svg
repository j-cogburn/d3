<svg viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect x="0" y="0" width="880" height="400" rx="14" fill="#ffffff"/>
  <text x="32" y="40" font-size="20" font-weight="700" fill="#0f172a">D3 v2 — the cycle</text>
  <text x="32" y="62" font-size="13" fill="#64748b">DEFINE leads (definition precedes action); LEARN closes the outer loop.</text>

  <!-- return loop on top -->
  <path d="M765 150 V100 H115 V150" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ah)"/>
  <text x="440" y="92" text-anchor="middle" font-size="12" fill="#64748b">LEARN's evidence feeds the next DEFINE</text>

  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
    <marker id="ab" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/></marker>
  </defs>

  <!-- phase boxes -->
  <g>
    <!-- DEFINE -->
    <rect x="32" y="150" width="140" height="76" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="102" y="182" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">DEFINE</text>
    <text x="102" y="201" text-anchor="middle" font-size="11" fill="#475569">problem -&gt; objective</text>
    <text x="102" y="217" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">=&gt; OBJECTIVE</text>
    <!-- SHAPE -->
    <rect x="204" y="150" width="140" height="76" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="274" y="182" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">SHAPE</text>
    <text x="274" y="201" text-anchor="middle" font-size="11" fill="#475569">options -&gt; sketch</text>
    <text x="274" y="217" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">=&gt; DIRECTIVES</text>
    <!-- BUILD -->
    <rect x="376" y="150" width="140" height="76" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="446" y="182" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">BUILD</text>
    <text x="446" y="201" text-anchor="middle" font-size="11" fill="#475569">parallel worktrees</text>
    <text x="446" y="217" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">=&gt; CODE</text>
    <!-- PROVE -->
    <rect x="548" y="150" width="140" height="76" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="618" y="182" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">PROVE</text>
    <text x="618" y="201" text-anchor="middle" font-size="11" fill="#475569">verify + review</text>
    <text x="618" y="217" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">=&gt; did it move?</text>
    <!-- LEARN -->
    <rect x="720" y="150" width="140" height="76" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
    <text x="790" y="182" text-anchor="middle" font-size="16" font-weight="700" fill="#065f46">LEARN</text>
    <text x="790" y="201" text-anchor="middle" font-size="11" fill="#475569">git + metrics</text>
    <text x="790" y="217" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">=&gt; EVIDENCE</text>
  </g>

  <!-- arrows between phases -->
  <g stroke="#2563eb" stroke-width="2" fill="none">
    <line x1="172" y1="188" x2="202" y2="188" marker-end="url(#ab)"/>
    <line x1="344" y1="188" x2="374" y2="188" marker-end="url(#ab)"/>
    <line x1="516" y1="188" x2="546" y2="188" marker-end="url(#ab)"/>
    <line x1="688" y1="188" x2="718" y2="188" marker-end="url(#ab)"/>
  </g>

  <!-- entry markers -->
  <text x="102" y="143" text-anchor="middle" font-size="10" fill="#2563eb">greenfield enters here</text>
  <text x="790" y="143" text-anchor="middle" font-size="10" fill="#059669">existing project enters here</text>

  <!-- nested loops legend -->
  <g font-size="12">
    <circle cx="44" cy="284" r="5" fill="#2563eb"/>
    <text x="58" y="288" fill="#334155"><tspan font-weight="700">Inner loop</tspan>  BUILD &lt;-&gt; PROVE  —  every session, parallel (be wrong cheaply)</text>
    <circle cx="44" cy="312" r="5" fill="#7c3aed"/>
    <text x="58" y="316" fill="#334155"><tspan font-weight="700">Middle loop</tspan>  DEFINE -&gt; LEARN  —  per objective; lives until met / pivoted / killed</text>
    <circle cx="44" cy="340" r="5" fill="#059669"/>
    <text x="58" y="344" fill="#334155"><tspan font-weight="700">Outer loop</tspan>  LEARN -&gt; Vision  —  continuous; the only loop allowed to change the Vision</text>
  </g>
</svg>
